services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: power-poc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-power_poc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-power_poc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: power-poc-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-power_poc}
      RAW_DATA_ROOT: ${RAW_DATA_ROOT:-/app/data/raw}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  timescaledb-data:
